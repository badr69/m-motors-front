<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - StoryBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="../static/css/styles.css">

</head>
<body>

<!-- Navbar sera injectée ici plus tard -->
<div id="navbar"></div>

<!-- Messages flash -->
<div id="flash-message"></div>

<!-- Contenu de la page -->
<div class="container mt-5 mb-5" style="max-width: 500px;">
    <div class="card shadow-lg border-0 p-4 rounded-4">
        <h2 class="text-center mb-4 text-dark fw-bold">Contact</h2>

        <form id="contact-form">
        
                <!-- Nom -->
            <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Nom</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Entrez votre nom" required>
            </div>
        
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Entrez votre adresse email" required>
            </div>

            <div class="mb-3">
                <label for="message" class="form-label fw-semibold">Message</label>
                <textarea id="message" name="message" class="form-control" rows="4" required></textarea>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-bold">Envoyer</button>
            </div>
        </form>
        <div class="feedback mt-2"></div> <!-- important -->

    </div>
</div>


<!-- Footer sera injecté ici -->
<div id="footer"></div>

<script type="module" src="../static/js/main.js"></script>

</body>
</html>
