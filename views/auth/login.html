<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StoryBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

    <!-- Navbar sera injectée ici via JS si besoin -->
    <div id="navbar"></div>

    <!-- Contenu -->
    <div class="container mt-5 mb-5" style="max-width: 500px;">
        <div class="card shadow-lg border-0 p-4 rounded-4">
            <h2 class="text-center mb-4 text-dark fw-bold">Login</h2>

            <form id="login-form">
                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Entrez votre adresse email" required>
                    <div class="text-danger small mt-1" id="email-error"></div>
                </div>

                <!-- Mot de passe -->
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Entrez un mot de passe" required>
                    <div class="text-danger small mt-1" id="password-error"></div>
                </div>

                <!-- Bouton -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-bold">Se connecter</button>
                </div>
            </form>

        </div>
    </div>

    <!-- Footer sera injecté ici via JS si besoin -->
    <div id="footer"></div>

    <!-- Script JS -->
   <script type="module" src="/static/js/main.js"></script>
</body>
</html>
