<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - StoryBlog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- REGISTER CONTAINER -->
    <div class="container mt-5 mb-5" style="max-width: 500px;">

        <div class="card shadow-lg border-0 p-4 rounded-4">

            <h2 class="text-center mb-4 fw-bold text-dark">
                Register
            </h2>

            <form id="register-form" method="POST">

                <!-- USERNAME -->
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">
                        Nom d'utilisateur
                    </label>
                    <input type="text"
                           id="username"
                           name="username"
                           class="form-control"
                           placeholder="Entrez votre nom d'utilisateur"
                           required>
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">
                        Email
                    </label>
                    <input type="email"
                           id="email"
                           name="email"
                           class="form-control"
                           placeholder="Entrez votre email"
                           required>
                </div>

                <!-- PHONE (NEW) -->
                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">
                        Téléphone
                    </label>
                    <input type="text"
                           id="phone"
                           name="phone"
                           class="form-control"
                           placeholder="Entrez votre numéro">
                </div>

                <!-- ADDRESS (NEW) -->
                <div class="mb-3">
                    <label for="address" class="form-label fw-semibold">
                        Adresse
                    </label>
                    <input type="text"
                           id="address"
                           name="address"
                           class="form-control"
                           placeholder="Entrez votre adresse">
                </div>

                <!-- PASSWORD -->
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">
                        Mot de passe
                    </label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Entrez votre mot de passe"
                           required>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="mb-3">
                    <label for="confirm_password" class="form-label fw-semibold">
                        Confirmer le mot de passe
                    </label>
                    <input type="password"
                           id="confirm_password"
                           name="confirm_password"
                           class="form-control"
                           placeholder="Confirmez votre mot de passe"
                           required>
                </div>

                <!-- ERROR / FEEDBACK -->
                <div class="feedback text-center mb-3 text-danger"></div>

                <!-- SUBMIT -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-bold">
                        S'inscrire
                    </button>
                </div>

            </form>

            <div class="text-center mt-3">
                <small>
                    Déjà inscrit ?
                    <a href="login.html" class="text-decoration-none fw-semibold">
                        Connectez-vous
                    </a>
                </small>
            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- MAIN JS -->
    <script type="module" src="/static/js/main.js"></script>

</body>
</html>
