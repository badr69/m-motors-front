<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Dossier - M-Motors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

<div class="container mt-5" style="max-width: 700px;">

    <h2 id="form-title">Créer un dossier de location</h2>

     <!-- ACTIONS -->
    <div class="mb-3 d-flex gap-2">

        <a href="/views/dashboard/user-dashboard.html" class="btn btn-secondary">
            🏠 Dashboard
        </a>

    </div>

    <form id="dossier-form">

        <!-- VEHICLE ID -->
         <select id="vehicle_id" class="form-control mb-2">
            <option value="">-- Choisir un véhicule --</option>
        </select>
       
        <!-- MESSAGE -->
        <textarea 
            id="message" 
            class="form-control mb-3" 
            placeholder="Message (optional)"
        ></textarea>

        <!-- STATUS (ADMIN ONLY EDIT MODE FUTURE) -->
        <select id="status" class="form-control mb-3" disabled>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
        </select>

        <!-- SUBMIT -->
        <button type="submit" class="btn btn-dark w-100">
            Valider
        </button>

    </form>

</div>

<!-- JS -->
<script type="module" src="/static/js/dossiers/create-dossier.js"></script>

</body>
</html>
