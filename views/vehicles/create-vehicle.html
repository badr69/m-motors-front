<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Vehicle - M-Motors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

<div class="container mt-5" style="max-width: 700px;">

    <h2 id="form-title">Créer un véhicule</h2>

    <form id="vehicle-form">

        <!-- BRAND -->
        <input type="text" id="brand" class="form-control mb-2" placeholder="Brand" required>

        <!-- MODEL -->
        <input type="text" id="model" class="form-control mb-2" placeholder="Model" required>

        <!-- YEAR -->
        <input type="number" id="year" class="form-control mb-2" placeholder="Year" required>

        <!-- MILEAGE -->
        <input type="number" id="mileage" class="form-control mb-2" placeholder="Mileage">

        <!-- FUEL TYPE -->
        <input type="text" id="fuel_type" class="form-control mb-2" placeholder="Fuel type">

        <!-- TRANSMISSION -->
        <input type="text" id="transmission" class="form-control mb-2" placeholder="Transmission">

        <!-- PRICE -->
        <input type="number" id="price" class="form-control mb-2" placeholder="Price" required>

        <!-- DESCRIPTION -->
        <textarea id="description" class="form-control mb-2" placeholder="Description"></textarea>

        <!-- IMAGE UPLOAD -->
        <label class="form-label">Vehicle Image</label>

        <input 
            type="file" 
            id="image" 
            name="image" 
            class="form-control mb-3"
            accept="image/*"
        />

        <!-- CATEGORY -->
        <input type="text" id="category" class="form-control mb-2" placeholder="Category">

        <!-- VEHICLE TYPE -->
        <input type="text" id="vehicle_type" class="form-control mb-2" placeholder="Vehicle type">

        <!-- STATUS -->
        <select id="status" class="form-control mb-3">
            <option value="available">Available</option>
            <option value="rented">Rented</option>
            <option value="maintenance">Maintenance</option>
        </select>

        <!-- SUBMIT -->
        <button type="submit" class="btn btn-dark w-100">
            Valider
        </button>

    </form>

</div>

<!-- JS -->
<script type="module" src="/static/js/vehicles/create-vehicle.js"></script>

</body>
</html>
